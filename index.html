<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linktree</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/general.css">
</head>
<body>
    <div class="content">
        <div class="linktree">
            <div class="profile-content">
                <div class="profile-picture">
                    <img onclick="window.location.href='/';" class="profile-picture" src="assets/img/individually/profile.jpeg" alt="profile_picture" id="ProfilePicture">
                </div>
                <a class="heading2" id="UserName"></a>
                <div class="socials">
                    <img id="github" src="https://m1l4n10.github.io/images/linktree/github.png" class="underheaaderimg" alt="GitHub">
                </div>
            </div>
            <br><br>
            <div class="grid">
                <div class="socialgrid"  id="instagram">
                    <img src="https://m1l4n10.github.io/images/linktree/instagram.webp" class="socialgridimg" alt="Instagram">
                    <a>Instagram</a>
                </div>
                <div class="socialgrid" id="spotify">
                    <img src="https://m1l4n10.github.io/images/linktree/spotify.png" class="socialgridimg" alt="Spotify">
                    <a>Spotify</a>
                </div>
                <div class="socialgrid" id="tiktok">
                    <img src="https://m1l4n10.github.io/images/linktree/tiktok.png" class="socialgridimg" alt="TikTok">
                    <a>TikTok</a>
                </div>
                <div class="socialgrid" id="snapchat">
                    <img src="https://m1l4n10.github.io/images/linktree/snapchat.png" class="socialgridimg" alt="Snapchat">
                    <a>Snapchat</a>
                </div>
                <div class="socialgrid" id="discord">
                    <img src="https://m1l4n10.github.io/images/linktree/discord.png" class="socialgridimg" alt="Discord">
                    <a>Discord</a>
                </div>
            </div>
            <br>
        </div>
        <br><br>
        <div class="footer">

            <a style="font-size: 7.5px;">Please note that this page is mostly designed for the mobile phone version.</a>
