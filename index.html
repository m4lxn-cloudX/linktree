<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linktree</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/general.css">
</head>
<body>
    <div class="content">
        <div class="linktree">
            <div class="profile-content">
                <div class="profile-picture">
                    <img onclick="window.location.href='/';" class="profile-picture" src="assets/img/individually/profile.jpeg" alt="profile_picture" id="ProfilePicture">
                </div>
                <a class="heading2" id="UserName"></a>
                <div class="socials">
                    <img id="discord" src="assets/img/discord.png" class="underheaaderimg" alt="Discord">
                </div>
            </div>
            <br>
            <div class="grid">
                <div class="socialgrid"  id="instagram">
                    <img src="assets/img/instagram.webp" class="socialgridimg" alt="Instagram">
                    <a>Instagram</a>
                </div>
                <div class="socialgrid" id="spotify">
                    <img src="assets/img/spotify.png" class="socialgridimg" alt="Spotify">
                    <a>Spotify</a>
                </div>
                <div class="socialgrid" id="tiktok">
                    <img src="assets/img/tiktok.png" class="socialgridimg" alt="TikTok">
                    <a>TikTok</a>
                </div>
                <div class="socialgrid" id="snapchat">
                    <img src="assets/img/snapchat.png" class="socialgridimg" alt="Snapchat">
                    <a>Snapchat</a>
                </div>
            </div>
        </div>
  </div>
  <script src="assets/js/fillin.js"></script>
</body>
